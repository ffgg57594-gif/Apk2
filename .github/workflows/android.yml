name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # هذه الخطوة ستقوم بإصلاح ملف الإعدادات التالف قبل البدء
    - name: Fix Gradle Wrapper URL
      run: |
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission
      run: chmod +x gradlew

    # بناء النسخة المخصصة للمتجر (AAB)
    - name: Build Bundle
      run: ./gradlew bundleRelease

    # رفع النسخة
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: my-app-bundle
        path: app/build/outputs/bundle/release/app-release.aab
        

# .github/workflows/android.yml

name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الكود من المستودع
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. إعداد نسخة الجافا
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. خطوة الإصلاح الجذري: إعادة إنشاء ملفات الـ Wrapper
    # هذه الخطوة ستقوم بحذف الملفات التالفة وإنشاء ملفات جديدة سليمة 100%
    - name: Regenerate Gradle Wrapper
      run: |
        rm -f gradlew
        rm -f gradlew.bat
        rm -rf gradle/wrapper
        gradle wrapper --gradle-version 8.7

    # 4. إعطاء صلاحية التنفيذ (للملف الجديد الذي تم إنشاؤه)
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 5. بناء نسخة الـ APK
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 6. رفع ملف الـ APK الناتج
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-web-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk

# .github/workflows/android.yml

name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # خطوة إضافية لإصلاح ملف gradle-wrapper.jar التالف
    - name: Repair Corrupt Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        wget https://raw.githubusercontent.com/gradle/gradle/v8.7/gradle/wrapper/gradle-wrapper.jar -P gradle/wrapper/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-web-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk

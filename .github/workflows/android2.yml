# .github/workflows/android.yml

name: Android CI/CD

# تشغيل الأتمتة عند رفع الكود على فرع main أو master
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الكود من المستودع
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. إعداد نسخة الجافا (JDK 17 مناسبة لأغلب إصدارات Gradle الحديثة)
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. إعطاء صلاحية التنفيذ لملف gradlew
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. بناء نسخة الـ APK (Debug)
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 5. رفع ملف الـ APK الناتج كأثر (Artifact) لكي تتمكن من تحميله
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-web-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk

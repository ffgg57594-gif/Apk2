apply plugin: 'com.android.application'

android {
    compileSdk 36
    
    defaultConfig {
        applicationId "com.drarabi.ppt"
        minSdkVersion 21
        targetSdkVersion 36
        
        // --- التغيير الأهم: يجب زيادة هذا الرقم في كل تحديث ---
        versionCode 5 
        versionName "1.2.2" 
        // ----------------------------------------------------
    }

    buildFeatures {
        buildConfig = true
    }

    buildTypes {
        release {
            // تفعيل الضغط لتقليل الحجم وتحسين الأداء
            minifyEnabled true 
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    namespace 'com.drarabi.ppt'

    // الإبقاء على حل تعارض المكتبات كما هو
    configurations.all {
        resolutionStrategy {
            eachDependency { DependencyResolveDetails details ->
                if (details.requested.group == 'org.jetbrains.kotlin') {
                    details.useVersion "1.8.22"
                }
            }
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
    
    constraints {
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") {
            because("kotlin-stdlib-jdk7 is now part of kotlin-stdlib")
        }
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") {
            because("kotlin-stdlib-jdk8 is now part of kotlin-stdlib")
        }
    }
}

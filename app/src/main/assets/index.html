<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تطبيقي البسيط</title>
    <style>
        body { text-align: center; font-family: Arial; margin-top: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>أهلاً بك في تطبيقي!</h1>
    <button onclick="changeMessage()">اضغط لتغيير الرسالة</button>
    <p id="message">مرحبا!</p>

    <script>
        const messages = ["مرحبا بك!", "كيف حالك اليوم؟", "أتمنى لك يوماً سعيداً!", "JavaScript ممتع!"];
        function changeMessage() {
            const index = Math.floor(Math.random() * messages.length);
            document.getElementById("message").textContent = messages[index];
        }
    </script>
</body>
</html>
